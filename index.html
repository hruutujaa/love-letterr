<!DOCTYPE html>
<html>
<head>
<title>Choose One 💝</title>
<style>
body {
  margin: 0;
  height: 100vh;
  background: #d8c6f2;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Arial', sans-serif;
  overflow: hidden;
}

.container {
  display: grid;
  grid-template-columns: repeat(2, 150px);
  gap: 40px;
}

.box {
  width: 150px;
  height: 150px;
  background: #ff4d4d;
  position: relative;
  cursor: pointer;
  border-radius: 10px;
  transition: transform 0.3s;
}

.box:hover {
  transform: scale(1.1);
}

.ribbon {
  position: absolute;
  width: 100%;
  height: 20px;
  background: darkred;
  top: 65px;
}

.ribbon::before {
  content: '';
  position: absolute;
  width: 20px;
  height: 100%;
  background: darkred;
  left: 65px;
  top: -65px;
  height: 150px;
}

.message {
  position: absolute;
  font-size: 40px;
  color: white;
  text-align: center;
  width: 100%;
  top: 40%;
  display: none;
  animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
</head>

<body>

<div class="container">
  <div class="box" onclick="openBox()">
    <div class="ribbon"></div>
  </div>
  <div class="box" onclick="openBox()">
    <div class="ribbon"></div>
  </div>
  <div class="box" onclick="openBox()">
    <div class="ribbon"></div>
  </div>
  <div class="box" onclick="openBox()">
    <div class="ribbon"></div>
  </div>
</div>

<div class="message" id="loveMessage">I LOVE YOUUU 💕</div>

<audio id="loveSong">
  <source src="YOUR_SONG_LINK_HERE.mp3" type="audio/mpeg">
</audio>

<script>
function openBox() {
  document.querySelector(".container").style.display = "none";
  document.getElementById("loveMessage").style.display = "block";
  document.getElementById("loveSong").play();
}
</script>

</body>
</html>
